{% extends "admin/base.html"%}

{% block title %} <title>Participants</title>{% endblock %}

{% block content %}

    <h5>Participants</h5>
    <form method="POST" action="{{ url_for('admin.add_participant', from_admin=1) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="from_admin" value="1">
        <button class="btn btn-success btn-sm">Add Participant</button>
    </form>
    {% if participants %}
        {% for p in participants %}
            <div class="d-flex gap-2">
                <p>
                    {{p.id}} | {{ p.name | capitalize }} | {{ p.email }}
                </p>
                <form action="{{url_for('admin.delete_user', u_id=p.id)}}" method="post">
                    <input type="hidden" name="csrf_token" value="{{csrf_token()}}">
                    <button class="btn btn-sm btn-danger">Delete</button>
                </form>
            </div>
        {% endfor %}
    {% endif %}

{% endblock %}
