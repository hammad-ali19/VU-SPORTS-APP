{% extends 'coach/base.html' %}

{% block title %}<title>Create Team</title>{% endblock %}

{% block content %}
<div class="container">
    <h2>Create New Team for {{ sport.name }}</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{csrf_token()}}">
        <div class="mb-3">
            <label for="name" class="form-label">Team Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="mb-3">
            <label for="max_participants" class="form-label">Max Participants</label>
            <input type="number" class="form-control" id="max_participants" name="max_participants" min="1" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Team</button>
        <a href="{{ url_for('coach.teams') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
