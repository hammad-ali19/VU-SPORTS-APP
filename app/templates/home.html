<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VU Sports Society</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex flex-column vh-100">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
            <div class="container">
                <span class="navbar-brand fw-bold text-primary">VU Sports Society</span>
                <div class="ms-auto">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-sm me-2">Login</a>
                    <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-sm">Register</a>
                </div>
            </div>
        </nav>

        <!-- Hero Section -->
        <section class="flex-fill d-flex align-items-center justify-content-center flex-column">
            <div class="container text-center">
                <h1 class="display-4 fw-bold mb-3">Welcome to VU Sports Society</h1>
                <p class="lead text-muted mb-4">Manage sports events, teams, and memberships — all in one place.</p>

                <a href="{{ url_for('auth.register') }}" class="btn btn-primary btn-lg me-3 px-4">Get Started</a>
                <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-lg px-4">Login</a>
            </div>
        </section>

    </div>
</body>
</html>
