{% extends 'participant/base.html' %}

{% block title %}<title>My Profile</title>{% endblock %}

{% block content %}
<div class="container mt-4">

    <!-- Profile Header -->
    <div class="card shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h4 class="mb-1">👤 {{ current_user.name }}</h4>
                <p class="text-muted mb-0">{{ current_user.email }}</p>
            </div>

            <span class="badge bg-info text-dark">
                {{ current_user.role.value | capitalize }}
            </span>
        </div>
    </div>

    <!-- Profile Form -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Edit Profile</h5>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row">

                    <!-- Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ current_user.name }}" required>
                    </div>

                    <!-- Email (disabled) -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email (cannot be changed)</label>
                        <input type="email" class="form-control"
                               value="{{ current_user.email }}" disabled>
                    </div>

                    <!-- University ID -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">University ID</label>
                        <input type="text" name="university_id" class="form-control"
                               value="{{ current_user.participant.university_id }}">
                    </div>

                    <!-- Max Sports Allowed -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Max Sports Allowed (cannot be changed)</label>
                        <input type="number" name="max_sports_allowed" class="form-control"
                               value="{{ current_user.participant.max_sports_allowed }}" min="1" disabled>
                    </div>

                    <!-- Achievements -->
                    <div class="col-12 mb-3">
                        <label class="form-label">Achievements</label>
                        <textarea name="achievements" class="form-control" rows="3">
{{ current_user.participant.achievements or '' }}
                        </textarea>
                    </div>

                    <!-- Past Participation -->
                    <div class="col-12 mb-3">
                        <label class="form-label">Past Participation</label>
                        <textarea name="past_participation" class="form-control" rows="3">
{{ current_user.participant.past_participation or '' }}
                        </textarea>
                    </div>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-end gap-2">
                    <button type="reset" class="btn btn-outline-secondary">
                        Reset
                    </button>
                    <button type="submit" class="btn btn-primary">
                        💾 Save Changes
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
